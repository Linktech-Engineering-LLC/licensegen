vault:
  # Environment variables take priority:
  #   LICENSEGEN_VAULT
  #   LICENSEGEN_VAULT_PASSWORD
  #
  # If these are not set, licensegen falls back to the paths below.

  file: ~/ansible/vault.yml
  password_file: ~/.ansible/password

  # NOTE: ansible-vault must be installed and available in PATH.


paths:
  # Environment override:
  #   LICENSEGEN_ROOT_DIR
  #
  # If set, licensegen uses that as the root.
  # If not, it uses this value.
  root_dir: data

  keypair_dir: keys
  products_dir: products

  product_file: product.yml
  editions_subdir: editions

  edition_file: edition.yml
  applications_subdir: applications

  application_file: application.yml
  license_file: license.json